name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Test and build APK
        run: ./gradlew test :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: beacon-android-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and build desktop
        run: |
          chmod +x dev/ensure-sing-box.sh
          dev/ensure-sing-box.sh "$PWD/sing-box"
          ./gradlew :core:test :desktop:test :desktop:installDist

  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build installer
        shell: pwsh
        run: |
          .\dev\ensure-sing-box.ps1 | Out-Null
          .\gradlew.bat :core:test :desktop:test :desktop:installDist
          .\dev\package-windows.ps1 -Version "0.2.0" -SkipBuild

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: beacon-windows-installer
          path: build/release/Beacon-Windows-*.exe
